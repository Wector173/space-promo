<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планеты — Исследуй</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #050510;
            font-family: 'Orbitron', sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(5,5,20,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex; justify-content: center;
            padding: 1rem; gap: 2rem;
        }
        nav a { color: #aaccff; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #fff; text-shadow: 0 0 10px cyan; }
        canvas { display: block; }
        #tooltip {
            position: absolute;
            background: rgba(0,0,0,0.75);
            color: #ffd700;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            pointer-events: none;
            transform: translate(-50%, -120%);
            font-size: 0.9rem;
            display: none;
        }
        .modal {
            display: none;
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,40,0.95);
            backdrop-filter: blur(15px);
            border: 1px solid #4a8eff;
            border-radius: 20px;
            padding: 2rem;
            z-index: 2000;
            max-width: 350px;
            text-align: center;
        }
        .modal.active { display: block; }
        .modal h2 { margin: 0 0 1rem; color: #ffd700; }
        .modal button {
            margin-top: 1rem;
            background: #4a8eff;
            border: none; padding: 0.5rem 1.5rem;
            color: white; border-radius: 10px;
            cursor: pointer; font-weight: bold;
        }
        .speed-indicator {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Главная</a>
        <a href="planets.html">Планеты</a>
        <a href="gallery.html">Галерея</a>
    </nav>
    <canvas id="solarCanvas"></canvas>
    <div id="tooltip"></div>
    <div id="planetModal" class="modal">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <button id="closeModal">Закрыть</button>
    </div>
    <div class="speed-indicator" id="speedDisplay">Скорость: 1x</div>

    <script>
        (function() {
            const canvas = document.getElementById('solarCanvas');
            const ctx = canvas.getContext('2d');
            const tooltip = document.getElementById('tooltip');
            const modal = document.getElementById('planetModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');
            const speedDisplay = document.getElementById('speedDisplay');

            let width, height;
            let animationId;
            let paused = false;
            let speedMultiplier = 1;
            let mouseX = 0, mouseY = 0;

            // Данные планет
            const planets = [
                { name: 'Меркурий', color: '#b0b0b0', radius: 8, distance: 60, speed: 0.04, desc: 'Ближайшая к Солнцу планета, крошечный мир.' },
                { name: 'Венера', color: '#e6c229', radius: 12, distance: 100, speed: 0.025, desc: 'Горячая планета с плотной атмосферой.' },
                { name: 'Земля', color: '#4a8eff', radius: 13, distance: 145, speed: 0.018, desc: 'Наш дом, единственная известная жизнь во Вселенной.' },
                { name: 'Марс', color: '#c1440e', radius: 10, distance: 195, speed: 0.015, desc: 'Красная планета, цель будущих миссий.' },
                { name: 'Юпитер', color: '#d9a066', radius: 24, distance: 260, speed: 0.01, desc: 'Газовый гигант, самая большая планета.' },
                { name: 'Сатурн', color: '#e0c97f', radius: 20, distance: 330, speed: 0.008, desc: 'Знаменит своими великолепными кольцами.' },
                { name: 'Уран', color: '#7ec8e3', radius: 16, distance: 395, speed: 0.006, desc: 'Ледяной гигант, вращающийся на боку.' },
                { name: 'Нептун', color: '#4169e1', radius: 15, distance: 450, speed: 0.005, desc: 'Далекая синяя планета с сильными ветрами.' }
            ];

            let sunX, sunY;
            let planetStates = [];

            function initPlanets() {
                sunX = width / 2;
                sunY = height / 2;
                planetStates = planets.map(p => ({
                    ...p,
                    angle: Math.random() * Math.PI * 2
                }));
            }

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                initPlanets();
            }
            window.addEventListener('resize', resize);
            resize();

            // Мышь для определения наведения
            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                mouseY = e.clientY - rect.top;
            });

            canvas.addEventListener('click', e => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                for (let p of planetStates) {
                    const px = sunX + Math.cos(p.angle) * p.distance;
                    const py = sunY + Math.sin(p.angle) * p.distance;
                    const dist = Math.hypot(mx - px, my - py);
                    if (dist < p.radius + 6) {
                        modalTitle.textContent = p.name;
                        modalDesc.textContent = p.desc;
                        modal.classList.add('active');
                        break;
                    }
                }
            });

            document.getElementById('closeModal').addEventListener('click', () => {
                modal.classList.remove('active');
            });
            window.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft') {
                    speedMultiplier = Math.max(0.25, speedMultiplier - 0.25);
                    speedDisplay.textContent = `Скорость: ${speedMultiplier.toFixed(2)}x`;
                } else if (e.key === 'ArrowRight') {
                    speedMultiplier = Math.min(3, speedMultiplier + 0.25);
                    speedDisplay.textContent = `Скорость: ${speedMultiplier.toFixed(2)}x`;
                } else if (e.key === ' ') {
                    e.preventDefault();
                    paused = !paused;
                    if (!paused) animate();
                }
            });

            function draw() {
                ctx.clearRect(0, 0, width, height);

                // Звёздный фон
                for (let i = 0; i < 200; i++) {
                    const sx = (i * 37 + 13) % width;
                    const sy = (i * 73 + 7) % height;
                    ctx.fillStyle = '#ffffff';
                    ctx.globalAlpha = 0.5 + (i % 3) * 0.2;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 1 + (i % 2), 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Солнце
                ctx.beginPath();
                ctx.arc(sunX, sunY, 30, 0, Math.PI*2);
                ctx.fillStyle = '#ffcc00';
                ctx.shadowColor = '#ffaa00';
                ctx.shadowBlur = 30;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Орбиты и планеты
                let hoveredPlanet = null;
                for (let p of planetStates) {
                    // Орбита
                    ctx.beginPath();
                    ctx.ellipse(sunX, sunY, p.distance, p.distance, 0, 0, Math.PI*2);
                    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                    ctx.stroke();

                    const px = sunX + Math.cos(p.angle) * p.distance;
                    const py = sunY + Math.sin(p.angle) * p.distance;

                    // Проверка наведения мыши
                    const distToMouse = Math.hypot(mouseX - px, mouseY - py);
                    if (distToMouse < p.radius + 5) {
                        hoveredPlanet = p;
                    }

                    // Планета
                    ctx.beginPath();
                    ctx.arc(px, py, p.radius, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    if (hoveredPlanet === p) {
                        ctx.shadowBlur = 25;
                        ctx.shadowColor = p.color;
                    }
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Кольца Сатурна
                    if (p.name === 'Сатурн') {
                        ctx.beginPath();
                        ctx.ellipse(px, py, p.radius*2, p.radius*0.6, 0.2, 0, Math.PI*2);
                        ctx.strokeStyle = '#e0c97f';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }

                    // Обновление угла
                    if (!paused) {
                        p.angle += p.speed * speedMultiplier * 0.5;
                    }
                }

                // Tooltip
                if (hoveredPlanet) {
                    const px = sunX + Math.cos(hoveredPlanet.angle) * hoveredPlanet.distance;
                    const py = sunY + Math.sin(hoveredPlanet.angle) * hoveredPlanet.distance;
                    tooltip.style.display = 'block';
                    tooltip.style.left = px + 'px';
                    tooltip.style.top = (py - hoveredPlanet.radius - 15) + 'px';
                    tooltip.textContent = hoveredPlanet.name;
                } else {
                    tooltip.style.display = 'none';
                }

                animationId = requestAnimationFrame(draw);
            }

            function animate() {
                if (!paused) draw();
                else cancelAnimationFrame(animationId);
            }
            animate();
        })();
    </script>
</body>
</html>
